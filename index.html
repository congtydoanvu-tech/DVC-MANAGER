
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DVC Quản Lý - High-End Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { font-size: 14px; }
        @media (min-width: 768px) { :root { font-size: 16px; } }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, #450a0a 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #0f172a 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #020617 0%, transparent 50%);
        }
        .fingerprint-scanner {
            position: relative;
            width: 80px; height: 80px;
            display: flex; items-center; justify-center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fingerprint-scanner.scanning {
            border-color: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }
        .scan-bar {
            position: absolute;
            left: 0; width: 100%; height: 2px;
            background: #ef4444;
            box-shadow: 0 0 15px #ef4444;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .scanning .scan-bar {
            opacity: 1;
            animation: scan-move 2s linear infinite;
        }
        @keyframes scan-move {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }
        .text-fluid-2xl { font-size: clamp(1.5rem, 1rem + 2vw, 2.5rem); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script type="module" src="/src/index.tsx"></script>

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

  }
}
</script>

</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
